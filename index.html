<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm UAV Workspace — PX4 + ROS2 + Python</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #161d2e;
            --bg-card-hover: #1c2540;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.12);
            --accent-glow: rgba(56, 189, 248, 0.25);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --border: rgba(56, 189, 248, 0.1);
            --border-hover: rgba(56, 189, 248, 0.3);
            --green: #34d399;
            --amber: #fbbf24;
            --red: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        .hero {
            padding: 80px 0 60px;
            position: relative;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--accent-dim);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            margin-bottom: 28px;
            animation: fadeIn 0.6s ease;
        }

        .tag .pulse {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 20px;
            animation: fadeSlideUp 0.7s ease;
        }

        h1 .highlight {
            background: linear-gradient(135deg, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 640px;
            animation: fadeSlideUp 0.7s ease 0.1s both;
        }

        .hero-links {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
            animation: fadeSlideUp 0.7s ease 0.2s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        section { padding: 50px 0; }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 20px;
        }

        .status-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(52, 211, 153, 0.1);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .roadmap-note {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .roadmap-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--amber);
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .metric {
            background: rgba(56, 189, 248, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .metric-label {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .demo-embed {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            margin-top: 16px;
        }

        .demo-embed iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .approach-grid { display: grid; gap: 12px; margin-top: 8px; }

        .approach-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 18px 22px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.25s ease;
        }

        .approach-item:hover {
            border-color: var(--border-hover);
            transform: translateX(4px);
        }

        .approach-icon {
            width: 36px; height: 36px; min-width: 36px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent-dim);
            border-radius: 10px; color: var(--accent);
        }

        .tech-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }

        .tech-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
        }

        .tech-dot { width: 8px; height: 8px; border-radius: 50%; }
        .tech-dot.ros { background: #38bdf8; }
        .tech-dot.px4 { background: #f97316; }
        .tech-dot.py { background: #fbbf24; }
        .tech-dot.msg { background: #a78bfa; }

        .goal-list { display: grid; gap: 10px; margin-top: 8px; }
        .goal-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 0.92rem; color: var(--text-secondary);
        }

        .goal-check {
            width: 22px; height: 22px; min-width: 22px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; background: rgba(52, 211, 153, 0.1);
            color: var(--green); font-size: 0.75rem;
        }

        .reference {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 0 12px 12px 0;
            padding: 20px 24px; margin-top: 24px;
        }

        footer {
            padding: 50px 0 40px; border-top: 1px solid var(--border); margin-top: 40px;
        }

        .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .footer-details { font-size: 0.82rem; color: var(--text-dim); margin-top: 4px; }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-in { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-hover), transparent); margin: 10px 0; }

        @media (max-width: 600px) {
            .metrics { grid-template-columns: 1fr 1fr; }
            .footer-content { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="hero">
        <div class="tag">
            <span class="pulse"></span>
            Under Active Development
        </div>
        <h1>
            <span class="highlight">Swarm UAV</span> Workspace
        </h1>
        <p class="hero-desc">
            A ROS2 and PX4-based swarm UAV workspace developed in Python. Built as both a guide and a ready-to-use environment for developing multi-UAV systems.
        </p>
